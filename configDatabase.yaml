        id BIGINT AUTO_INCREMENT NOT NULL,
        tableName VARCHAR(150) NOT NULL,
        date DATE NOT NULL,
        records INT NOT NULL,
        insertedTimestamp DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
